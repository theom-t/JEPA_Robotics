<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JEPA Robotics - AI Debugger</title>
    <!-- Use Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.75);
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            background: radial-gradient(circle at top left, #1e293b, var(--bg-color));
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 2rem;
            display: flex;
            gap: 2rem;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .video-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        img#mjpeg-stream {
            width: 100%;
            max-width: 900px;
            border-radius: 16px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5);
            object-fit: contain;
            border: 1px solid var(--glass-border);
        }
        .controls {
            width: 380px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
        }
        /* Custom scrollbar for controls */
        .controls::-webkit-scrollbar {
            width: 6px;
        }
        .controls::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        h1 {
            margin: 0 0 0.5rem 0;
            font-size: 1.75rem;
            font-weight: 600;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            margin: 0 0 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            background: rgba(255, 255, 255, 0.03);
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .slider-group label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            justify-content: space-between;
        }
        .val-display {
            color: var(--text-main);
            font-family: monospace;
            font-size: 0.9rem;
        }
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: var(--text-main);
            cursor: pointer;
            margin-top: -7px;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.6);
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }
        .btn {
            background: linear-gradient(135deg, #0284c7, #4f46e5);
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: auto;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.5);
        }
        .btn:active {
            transform: translateY(0);
        }
        .status-badge {
            position: absolute;
            top: 2rem;
            left: 2rem;
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(16, 185, 129, 0.3);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .pulse {
            width: 8px;
            height: 8px;
            background: #34d399;
            border-radius: 50%;
            box-shadow: 0 0 10px #34d399;
            animation: pulse-anim 2s infinite;
        }
        @keyframes pulse-anim {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="glass-panel video-container">
        <div class="status-badge">
            <div class="pulse"></div>
            Model LIVE
        </div>
        <img id="mjpeg-stream" src="/video_feed" alt="MuJoCo Stream">
    </div>

    <div class="glass-panel controls">
        <div>
            <h1>V-JEPA AI Debugger</h1>
            <p>Drag the sliders to move the true SO100 arm. The Holographic Cyan ghost is driven entirely by the ViT's Latent State prediction.</p>
        </div>
        
        <div class="slider-group">
            <label>Shoulder Pan <span class="val-display" id="v0">0.00</span></label>
            <input type="range" id="j0" min="-1.9" max="1.9" step="0.02" value="0">
        </div>
        <div class="slider-group">
            <label>Shoulder Lift <span class="val-display" id="v1">0.00</span></label>
            <input type="range" id="j1" min="-1.74" max="1.74" step="0.02" value="0">
        </div>
        <div class="slider-group">
            <label>Elbow Flex <span class="val-display" id="v2">0.00</span></label>
            <input type="range" id="j2" min="-1.69" max="1.69" step="0.02" value="0">
        </div>
        <div class="slider-group">
            <label>Wrist Flex <span class="val-display" id="v3">0.00</span></label>
            <input type="range" id="j3" min="-1.65" max="1.65" step="0.02" value="0">
        </div>
        <div class="slider-group">
            <label>Wrist Roll <span class="val-display" id="v4">0.00</span></label>
            <input type="range" id="j4" min="-2.8" max="2.8" step="0.02" value="0">
        </div>
        <div class="slider-group">
            <label>Gripper <span class="val-display" id="v5">0.00</span></label>
            <input type="range" id="j5" min="-0.17" max="1.74" step="0.02" value="0">
        </div>
        
        <button class="btn" id="imagine-btn">Imagine Trajectory ✨</button>
    </div>

    <script>
        const sliders = [
            document.getElementById('j0'),
            document.getElementById('j1'),
            document.getElementById('j2'),
            document.getElementById('j3'),
            document.getElementById('j4'),
            document.getElementById('j5')
        ];
        const displays = [
            document.getElementById('v0'),
            document.getElementById('v1'),
            document.getElementById('v2'),
            document.getElementById('v3'),
            document.getElementById('v4'),
            document.getElementById('v5')
        ];
        const imagineBtn = document.getElementById('imagine-btn');

        function sendJoints() {
            const joints = sliders.map((s, i) => {
                const val = parseFloat(s.value);
                displays[i].innerText = val.toFixed(2);
                return val;
            });
            
            fetch('/update_joints', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ joints: joints })
            });
        }

        // Trigger Imagination Rollout
        imagineBtn.addEventListener('click', () => {
            fetch('/imagine', { method: 'POST' });
        });

        // Send updates rapidly as the user drags
        sliders.forEach(s => s.addEventListener('input', sendJoints));
    </script>
</body>
</html>
